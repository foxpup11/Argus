<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="title-section">
                <h1 class="title">AgentScope</h1>
            </div>
            <div class="header-actions">
                <button id="refreshBtn" class="btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    刷新
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="main">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>会话</h2>
                    <div class="search-wrapper">
                        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="搜索..." class="search-input">
                    </div>
                </div>
                <div id="sessionList" class="session-list">
                    <div class="loading">加载中...</div>
                </div>
            </aside>

            <!-- Content -->
            <section class="content">
                <!-- File Table -->
                <div class="file-table-container">
                    <div class="table-header">
                        <h3>文件改动</h3>
                        <span id="fileCount" class="badge">0</span>
                    </div>
                    <table id="fileTable" class="file-table">
                        <thead>
                            <tr>
                                <th style="width: 100px">Risk</th>
                                <th>File</th>
                                <th style="width: 100px">Change</th>
                                <th style="width: 60px">Ops</th>
                            </tr>
                        </thead>
                        <tbody id="fileTableBody">
                            <tr>
                                <td colspan="4" class="empty-state">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <p>选择会话查看改动</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Diff View -->
                <div class="diff-container">
                    <div class="diff-header">
                        <h3>Diff</h3>
                        <span id="diffFileName" class="diff-filename"></span>
                    </div>
                    <pre id="diffView" class="diff-view"><code>选择文件查看差异</code></pre>
                </div>
            </section>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="statusSession">会话: -</span>
            <span id="statusBranch">分支: -</span>
            <span id="statusTokens">Token: - in / - out</span>
        </footer>
    </div>

    <script src="./app.js"></script>
</body>
</html>
